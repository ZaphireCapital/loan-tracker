<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d1b2a;--navy-mid:#162236;--navy-light:#1e3050;--gold:#c9a84c;--gold-light:#e2c47a;--gold-dim:#8a6d2e;--teal:#2a9d8f;--teal-light:#3dbdad;--red:#e63946;--green:#2dc653;--white:#f0f4f8;--muted:#8fa0b5;--border:rgba(201,168,76,0.18);--card:rgba(22,34,54,0.95);--shadow:0 8px 32px rgba(0,0,0,0.4);--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);overflow:hidden;}
#app{display:flex;height:100vh;}
#sidebar{width:220px;flex-shrink:0;background:var(--navy-mid);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
.sidebar-logo .wordmark{font-family:'DM Serif Display',serif;font-size:18px;color:var(--gold);letter-spacing:0.02em;line-height:1.2;}
.sidebar-logo .sub{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.nav-section{padding:12px 0;}
.nav-label{font-size:10px;color:var(--gold-dim);letter-spacing:0.12em;text-transform:uppercase;padding:6px 20px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13.5px;font-weight:500;color:var(--muted);cursor:pointer;border-left:3px solid transparent;transition:all 0.18s;}
.nav-item:hover{color:var(--white);background:rgba(201,168,76,0.06);}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(201,168,76,0.08);}
.nav-item .icon{font-size:16px;width:20px;text-align:center;}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--border);}
.sync-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background 0.3s;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:56px;flex-shrink:0;background:var(--navy-mid);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;}
.topbar-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--gold-light);}
.topbar-actions{display:flex;gap:10px;}
.btn{padding:7px 16px;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:var(--gold-light);}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--gold);background:rgba(201,168,76,0.08);}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--white);}
.btn-ghost:hover{background:rgba(255,255,255,0.1);}
.btn-danger{background:var(--red);color:white;}
.btn-teal{background:var(--teal);color:white;}
.btn-teal:hover{background:var(--teal-light);}
.btn-sm{padding:5px 11px;font-size:12px;}
.content{flex:1;overflow-y:auto;padding:28px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.card-title{font-family:'DM Serif Display',serif;font-size:17px;color:var(--gold-light);}
.card-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
.stat-tile{background:var(--navy-light);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;}
.stat-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold);}
.stat-tile.teal::before{background:var(--teal);}
.stat-tile.green::before{background:var(--green);}
.stat-tile.red::before{background:var(--red);}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:var(--white);}
.stat-value.gold{color:var(--gold);}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;padding:10px 14px;color:var(--gold-dim);font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.12s;cursor:pointer;}
tbody tr:hover{background:rgba(201,168,76,0.05);}
tbody td{padding:11px 14px;color:var(--white);vertical-align:middle;}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;}
.badge-open{background:rgba(45,198,83,0.15);color:var(--green);border:1px solid rgba(45,198,83,0.3);}
.badge-closed{background:rgba(230,57,70,0.15);color:var(--red);border:1px solid rgba(230,57,70,0.3);}
.badge-pending{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.3);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-grid.cols3{grid-template-columns:1fr 1fr 1fr;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
label{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:0.04em;}
input,select,textarea{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13.5px;padding:9px 13px;outline:none;transition:border 0.15s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--gold);}
select option{background:var(--navy-mid);}
textarea{resize:vertical;min-height:80px;}
.input-prefix{display:flex;}
.input-prefix span{background:var(--navy-light);border:1px solid var(--border);border-right:none;border-radius:8px 0 0 8px;padding:9px 10px;font-size:13px;color:var(--gold);}
.input-prefix input{border-radius:0 8px 8px 0;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.modal{background:var(--navy-mid);border:1px solid var(--border);border-radius:16px;padding:32px;width:700px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.6);}
.modal-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--gold-light);margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
.section-divider{margin:24px 0;border:none;border-top:1px solid var(--border);}
.section-label{font-size:12px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:14px;font-weight:600;}
.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;}
.month-bars{display:flex;gap:8px;align-items:flex-end;height:120px;padding-top:10px;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;background:var(--gold);border-radius:4px 4px 0 0;min-height:2px;transition:opacity 0.15s;}
.bar:hover{opacity:0.7;}
.bar-lbl{font-size:10px;color:var(--muted);}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab:hover{color:var(--white);}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.25);border-radius:20px;font-size:12px;color:var(--gold-light);}
.tag-del{cursor:pointer;opacity:0.5;font-size:14px;line-height:1;}
.tag-del:hover{opacity:1;color:var(--red);}
.tag-add-row{display:flex;gap:8px;margin-top:10px;}
.quarter-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.q-tile{background:var(--navy-light);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.q-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}
.q-value{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--gold);}
.q-count{font-size:11px;color:var(--muted);margin-top:4px;}
.closed-file-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.closed-file-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.closed-file-name{font-weight:600;font-size:14px;color:var(--white);}
.closed-file-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.closed-file-notes{font-size:13px;color:var(--muted);line-height:1.6;}
.search-row{display:flex;gap:10px;margin-bottom:18px;align-items:center;flex-wrap:wrap;}
.search-row input{max-width:240px;}
.search-row select{max-width:160px;}
.gap{height:20px;}
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:14px;gap:10px;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#lock-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:0;}
.lock-card{background:var(--navy-mid);border:1px solid var(--border);border-radius:20px;padding:48px 44px;width:380px;max-width:92vw;box-shadow:0 32px 80px rgba(0,0,0,0.6);text-align:center;}
.lock-logo{font-family:'DM Serif Display',serif;font-size:28px;color:var(--gold);margin-bottom:4px;letter-spacing:0.02em;}
.lock-sub{font-size:11px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:36px;}
.lock-label{font-size:12px;color:var(--muted);text-align:left;margin-bottom:8px;font-weight:500;letter-spacing:0.04em;}
.lock-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 16px;outline:none;transition:border 0.15s;text-align:center;letter-spacing:0.08em;}
.lock-input:focus{border-color:var(--gold);}
.lock-btn{width:100%;margin-top:16px;padding:13px;border-radius:10px;background:var(--gold);color:var(--navy);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:background 0.15s;}
.lock-btn:hover{background:var(--gold-light);}
.lock-err{color:var(--red);font-size:12px;margin-top:10px;min-height:18px;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--navy-light);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim);}
@media print{
  #sidebar,.topbar,.topbar-actions,.btn,.modal-overlay{display:none!important;}
  body{background:white;color:black;}
  .card{border:1px solid #ccc;box-shadow:none;background:white;}
  .stat-tile{background:#f5f5f5;border:1px solid #ccc;}
  thead th,tbody td{color:black;}

</style>

function supa(table) {
  var base = SUPA_URL + '/rest/v1/' + table;
  var headers = {
    'apikey': SUPA_KEY,
    'Authorization': 'Bearer ' + SUPA_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };
  return {
    select: function(cols) {
      return fetch(base + '?select=' + (cols||'*'), {headers: headers})
        .then(function(r){return r.json();});
    },
    insert: function(data) {
      return fetch(base, {method:'POST', headers: headers, body: JSON.stringify(data)})
        .then(function(r){return r.json();});
    },
    update: function(id, data) {
      return fetch(base + '?id=eq.' + id, {method:'PATCH', headers: Object.assign({}, headers, {'Prefer':'return=representation'}), body: JSON.stringify(data)})
        .then(function(r){return r.json();});
    },
    delete: function(id) {
      return fetch(base + '?id=eq.' + id, {method:'DELETE', headers: headers});
    },
    upsert: function(data) {
      return fetch(base, {method:'POST', headers: Object.assign({}, headers, {'Prefer':'resolution=merge-duplicates,return=representation'}), body: JSON.stringify(data)})
        .then(function(r){return r.json();});
    }
  };
}

// ── SYNC STATUS ───────────────────────────────
function setSyncStatus(status, msg) {
  var dot = document.getElementById('sync-dot');
  var lbl = document.getElementById('sync-label');
  if(!dot || !lbl) return;
  var colors = {connected:'var(--green)', saving:'var(--gold)', saved:'var(--green)', error:'var(--red)', loading:'var(--muted)'};
  dot.style.background = colors[status] || 'var(--muted)';
  lbl.textContent = msg || status;
}

// ── SUPABASE API HELPERS ──────────────────────
function apiHeaders(extra) {
  var h = {
    'apikey': SUPA_KEY,
    'Authorization': 'Bearer ' + SUPA_KEY,
    'Content-Type': 'application/json'
  };
  if(extra) Object.keys(extra).forEach(function(k){h[k]=extra[k];});
  return h;
}

function apiGet(table, query) {
  var url = SUPA_URL + '/rest/v1/' + table + '?' + (query||'select=*') + '&order=id.asc';
  return fetch(url, {headers: apiHeaders()}).then(function(r){
    if(!r.ok) throw new Error('GET failed: ' + r.status);
    return r.json();
  });
}

function apiPost(table, data) {
  return fetch(SUPA_URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: apiHeaders({'Prefer':'return=representation'}),
    body: JSON.stringify(data)
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error(t);});
    return r.json();
  });
}

function apiPatch(table, id, data) {
  return fetch(SUPA_URL + '/rest/v1/' + table + '?id=eq.' + id, {
    method: 'PATCH',
    headers: apiHeaders({'Prefer':'return=representation'}),
    body: JSON.stringify(data)
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error(t);});
    return r.json();
  });
}

function apiDelete(table, id) {
  return fetch(SUPA_URL + '/rest/v1/' + table + '?id=eq.' + id, {
    method: 'DELETE',
    headers: apiHeaders()
  });
}

function apiUpsert(table, data) {
  return fetch(SUPA_URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: apiHeaders({'Prefer':'resolution=merge-duplicates,return=representation'}),
    body: JSON.stringify(data)
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error(t);});
    return r.json();
  });
}

// ── INIT / LOAD ───────────────────────────────
function initApp() {
  setSyncStatus('loading', 'Connecting...');
  Promise.all([
    apiGet('zt_loans', 'select=*'),
    apiGet('zt_settings', 'select=*')
  ]).then(function(results) {
    var loans = results[0];
    // If no loans exist yet, seed with default data
    if(!loans || loans.length === 0) {
      return seedDefaultData().then(function() {
        return Promise.all([
          apiGet('zt_loans', 'select=*'),
          apiGet('zt_settings', 'select=*')
        ]);
      }).then(function(r2) { return r2; });
    }
    return results;
  }).then(function(results) {
    // Separate active loans from trashed ones
    var allLoans = results[0] || [];
    state.loans = allLoans.filter(function(l){ return !l.deleted_at; });
    state.trash = allLoans.filter(function(l){ return !!l.deleted_at; });
    var settingsRows = results[1] || [];
    settingsRows.forEach(function(row) {
      try { if(row.key === 'main') state.settings = JSON.parse(row.value); } catch(e) {}
    });
    return Promise.all([
      apiGet('zt_loans', 'select=*'),
      apiGet('zt_settings', 'select=*'),
      apiGet('zt_notes', 'select=*'),
      apiGet('zt_dates', 'select=*')
    ]);
  }).then(function(results) {
    (results[2]||[]).forEach(function(n) { state.closedNotes[n.loan_id] = n.note; });
    var allDates = results[3] || [];
    state.dates = allDates.filter(function(d){ return !d.deleted_at; });
    state.datesTrash = allDates.filter(function(d){ return !!d.deleted_at; });
    updateTrashBadge();
    updateDatesBadge();
    setSyncStatus('connected', 'Synced \u2713');
    showPage('dashboard');
  }).catch(function(err) {
    setSyncStatus('error', 'Connection error');
    if(err.message && err.message.indexOf('42P01') > -1) {
      document.getElementById('content').innerHTML = needsSetupHtml();
    } else {
      document.getElementById('content').innerHTML = '<div style="padding:40px;color:var(--red);line-height:2"><strong>Connection error:</strong><br>' + err.message + '</div>';
    }
  });
}

function updateTrashBadge() {
  // Auto-expire trash older than 30 days from display
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 30);
  state.trash = (state.trash||[]).filter(function(l){
    return new Date(l.deleted_at) > cutoff;
  });
  var el = document.getElementById('trash-count');
  if(!el) return;
  if(state.trash && state.trash.length > 0) {
    el.textContent = state.trash.length;
    el.style.display = 'inline';
  } else {
    el.style.display = 'none';
  }
}

function seedDefaultData() {
  return apiPost('zt_loans', DEFAULT_LOANS).then(function() {
    return apiUpsert('zt_settings', [{key:'main', value: JSON.stringify(state.settings)}]);
  });
}

function getSetupSQL() {
  return [

    '',
    'create table if not exists zt_loans (',
    '  id bigserial primary key,',
    '  borrower text,',

    '  type text,',
    '  status text,',
    '  company_comp_pct numeric,',

    '  zaphire_pct numeric,',
    '  zaphire_cut numeric,',
    '  deric_pct numeric,',
    '  deric_amount numeric,',
    '  jules_pct numeric,',
    '  jules_amount numeric,',
    '  tolerance numeric,',
    '  notes text,',
    '  loans_linked text,',
    '  pipeline_notes text,',
    '  expected_close_date date,',
    '  expected_fund_date date,',
    '  created_at timestamptz default now()',
    ');',
    '',
    'create table if not exists zt_settings (',
    '  id bigserial primary key,',
    '  key text unique,',
    '  value text',
    ');',
    '',
    'create table if not exists zt_notes (',
    '  id bigserial primary key,',
    '  loan_id bigint references zt_loans(id) on delete cascade,',
    '  note text,',
    '  updated_at timestamptz default now()',
    ');',
    '',
    '-- Allow public access (anon key)',
    'alter table zt_loans enable row level security;',
    'alter table zt_settings enable row level security;',

// ── FORMATTERS ────────────────────────────────
function fmtDollar(n) {
  if(!n && n !== 0) return '\u2014';
  return '$' + parseFloat(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtDate(d) {
  if(!d) return '\u2014';
  var dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function badge(status) {
  var cls = status==='Closed'?'badge-closed':status==='Active'?'badge-open':'badge-pending';
  return '<span class="badge ' + cls + '">' + esc(status) + '</span>';
}
function statTile(cls, label, value, sub) {
  return '<div class="stat-tile ' + cls + '"><div class="stat-label">' + label + '</div><div class="stat-value">' + value + '</div><div class="stat-sub">' + sub + '</div></div>';
}
function miniTile(color, label, val) {
  return '<div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">' + label + '</div><div style="font-family:\'JetBrains Mono\',monospace;font-size:15px;color:' + color + '">' + val + '</div></div>';
}

  html+='<div class="card"><div class="table-wrap"><table><thead><tr><th>Borrower</th><th>Loan Amount</th><th>Type</th><th>Actual Close</th><th>Exp. Close</th><th>Exp. Fund</th><th>Gross</th><th>Zaphire</th><th>Deric</th><th>Status</th><th></th></tr></thead><tbody>';

  var html='<div class="card">';
  html+='<div class="card-header"><div><div class="card-title">Closed File Notes</div><div class="card-sub">Click Notes to add details to any closed file</div></div></div>';

function editClosedNote(id){
  var loan=state.loans.find(function(l){return l.id===id;});
  var existing=state.closedNotes[id]||loan.notes||'';
  var html='<div class="modal-title">File Notes</div>';
  html+='<div class="modal-sub">'+esc(loan.borrower)+' &middot; '+esc(loan.type)+' &middot; '+fmtDollar(loan.loan_amount)+'</div>';
  html+='<div class="form-group"><label>Notes</label><textarea id="note-text" rows="8" style="min-height:160px">'+esc(existing)+'</textarea></div>';
  html+='<div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="saveClosedNote('+id+')">Save Notes</button></div>';
  openModal(html);
}

function saveClosedNote(id){
  var note=document.getElementById('note-text').value;
  setSyncStatus('saving','Saving...');
  // Check if note already exists
  apiGet('zt_notes','select=*&loan_id=eq.'+id).then(function(rows){
    var promise;
    if(rows&&rows.length>0){
      promise=apiPatch('zt_notes',rows[0].id,{note:note,updated_at:new Date().toISOString()});
    } else {
      promise=apiPost('zt_notes',[{loan_id:id,note:note}]);
    }
    return promise;
  }).then(function(){
    state.closedNotes[id]=note;
    setSyncStatus('saved','Saved \u2713');
    closeModal();renderClosed();
  }).catch(function(e){setSyncStatus('error','Save failed');alert('Error saving note: '+e.message);});
}

// ── EARNINGS ─────────────────────────────────
function renderEarnings(){
  var el=document.getElementById('content');
  var closed=state.loans.filter(function(l){return l.status==='Closed';});
  var mNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var mData=[];
  for(var i=0;i<12;i++) mData.push({loans:[],gross:0,z:0,d:0,j:0});
  closed.forEach(function(l){
    if(l.closing_date){var m=new Date(l.closing_date+'T12:00:00').getMonth();mData[m].loans.push(l);mData[m].gross+=+(l.gross_earnings||0);mData[m].z+=+(l.zaphire_cut||0);mData[m].d+=+(l.deric_amount||0);mData[m].j+=+(l.jules_amount||0);}
  });
  var tG=0,tZ=0,tD=0,tJ=0;
  closed.forEach(function(l){tG+=+(l.gross_earnings||0);tZ+=+(l.zaphire_cut||0);tD+=+(l.deric_amount||0);tJ+=+(l.jules_amount||0);});

  // ── Deric income projections ──
  var now = new Date();
  var currentMonth = now.getMonth(); // 0-based
  var currentYear = now.getFullYear();
  var dayOfYear = Math.floor((now - new Date(currentYear,0,1)) / 86400000) + 1;
  var daysInYear = ((currentYear%4===0&&currentYear%100!==0)||currentYear%400===0) ? 366 : 365;

  // Months that have passed — up to and including current month index
  // e.g. if we are in May (month 4), months elapsed = 5 (Jan-May)
  // Use fractional month: day of year / (days in year / 12)
  var monthsElapsed = dayOfYear / (daysInYear / 12);
  var monthsElapsedWhole = currentMonth + 1; // whole months that have started

  // YTD Deric = only from this calendar year
  var ytdDeric = 0;
  mData.forEach(function(m,i){
    if(i <= currentMonth) ytdDeric += m.d;
  });

  // Monthly average = YTD / months elapsed (fractional, so partial month counts)
  var monthlyAvg = monthsElapsed > 0 ? ytdDeric / monthsElapsed : 0;

  // Pace = monthly avg * 12
  var annualPace = monthlyAvg * 12;

  // Remaining projected = monthly avg * months remaining
  var monthsRemaining = 12 - monthsElapsed;
  var remainingProjected = monthlyAvg * monthsRemaining;

  // Best month
  var bestMonthD = 0, bestMonthName = 'N/A';
  mData.forEach(function(m,i){ if(m.d > bestMonthD){ bestMonthD=m.d; bestMonthName=mNames[i]; }});

  var html='';

  // ── Deric Income Summary card ──
  html+='<div class="card" style="margin-bottom:24px;border-color:rgba(201,168,76,0.35)">';
  html+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">';
  html+='<div style="font-size:28px">&#128188;</div>';
  html+='<div><div class="card-title">Deric\'s Income Summary</div><div class="card-sub">'+currentYear+' performance &amp; projections &mdash; as of '+now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})+'</div></div>';
  html+='</div>';

  // Four big stat tiles
  html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px">';

  // YTD
  html+='<div style="background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.3);border-radius:12px;padding:18px;text-align:center;position:relative;overflow:hidden">';
  html+='<div style="position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold)"></div>';
  html+='<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">YTD Earnings</div>';
  html+='<div style="font-family:\'JetBrains Mono\',monospace;font-size:22px;color:var(--gold);font-weight:500">'+fmtDollar(ytdDeric)+'</div>';
  html+='<div style="font-size:11px;color:var(--muted);margin-top:6px">'+mNames[0]+' &ndash; '+mNames[currentMonth]+'</div>';
  html+='</div>';

  // Monthly avg
  html+='<div style="background:rgba(42,157,143,0.08);border:1px solid rgba(42,157,143,0.25);border-radius:12px;padding:18px;text-align:center;position:relative;overflow:hidden">';
  html+='<div style="position:absolute;top:0;left:0;right:0;height:3px;background:var(--teal)"></div>';
  html+='<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">Monthly Average</div>';
  html+='<div style="font-family:\'JetBrains Mono\',monospace;font-size:22px;color:var(--teal-light);font-weight:500">'+fmtDollar(monthlyAvg)+'</div>';
  html+='<div style="font-size:11px;color:var(--muted);margin-top:6px">YTD &divide; '+monthsElapsed.toFixed(1)+' months</div>';
  html+='</div>';

  // Annual pace
  html+='<div style="background:rgba(45,198,83,0.08);border:1px solid rgba(45,198,83,0.25);border-radius:12px;padding:18px;text-align:center;position:relative;overflow:hidden">';
  html+='<div style="position:absolute;top:0;left:0;right:0;height:3px;background:var(--green)"></div>';
  html+='<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">Annual Pace</div>';
  html+='<div style="font-family:\'JetBrains Mono\',monospace;font-size:22px;color:var(--green);font-weight:500">'+fmtDollar(annualPace)+'</div>';
  html+='<div style="font-size:11px;color:var(--muted);margin-top:6px">Monthly avg &times; 12</div>';
  html+='</div>';

  // Projected remaining
  html+='<div style="background:rgba(147,112,219,0.08);border:1px solid rgba(147,112,219,0.25);border-radius:12px;padding:18px;text-align:center;position:relative;overflow:hidden">';
  html+='<div style="position:absolute;top:0;left:0;right:0;height:3px;background:#9370db"></div>';
  html+='<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">Projected Remaining</div>';
  html+='<div style="font-family:\'JetBrains Mono\',monospace;font-size:22px;color:#c4a8f5;font-weight:500">'+fmtDollar(remainingProjected)+'</div>';
  html+='<div style="font-size:11px;color:var(--muted);margin-top:6px">'+monthsRemaining.toFixed(1)+' months left at avg</div>';
  html+='</div>';

  html+='</div>';

  // Progress bar toward annual pace
  var progressPct = annualPace > 0 ? Math.min(100, (ytdDeric / annualPace) * 100) : 0;
  var progressPctDisplay = (ytdDeric / (annualPace||1) * 100).toFixed(1);
  html+='<div style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">';
  html+='<div style="font-size:12px;color:var(--muted)">Year progress: <strong style="color:var(--white)">'+progressPctDisplay+'%</strong> of projected annual earnings</div>';
  html+='<div style="font-size:12px;color:var(--muted)">Best month: <strong style="color:var(--gold)">'+bestMonthName+' ('+fmtDollar(bestMonthD)+')</strong></div>';
  html+='</div>';
  html+='<div style="background:rgba(255,255,255,0.06);border-radius:6px;height:10px;overflow:hidden">';
  html+='<div style="height:100%;width:'+progressPct+'%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:6px;transition:width 0.5s"></div>';
  html+='</div>';

  // How the projection works
  html+='<div style="margin-top:14px;padding:12px 14px;background:rgba(255,255,255,0.03);border-radius:8px;font-size:12px;color:var(--muted);line-height:1.7">';
  html+='<strong style="color:var(--white)">How these are calculated:</strong><br>';
  html+='YTD: sum of all Deric payments on closed loans this calendar year &nbsp;&middot;&nbsp; ';
  html+='Monthly Avg: YTD &divide; '+monthsElapsed.toFixed(2)+' months elapsed (including partial current month) &nbsp;&middot;&nbsp; ';
  html+='Annual Pace: monthly avg &times; 12 &nbsp;&middot;&nbsp; ';
  html+='Projected Remaining: monthly avg &times; '+monthsRemaining.toFixed(2)+' months left in year';
  html+='</div>';
  html+='</div>';

  // Overall summary tiles
  html+='<div class="stat-grid" style="margin-bottom:24px">';
  html+=statTile('','YTD Gross','<span class="gold">'+fmtDollar(tG)+'</span>','All closed');
  html+=statTile('teal','Zaphire Total',fmtDollar(tZ),'Company share');
  html+=statTile('green','Deric Total',fmtDollar(tD),'All time');
  html+=statTile('','Jules Total','<span style="color:#c4a8f5">'+fmtDollar(tJ)+'</span>','All time');
  html+='</div>';

  html+='<div class="card" style="margin-bottom:20px"><div class="card-title" style="margin-bottom:18px">Monthly Breakdown</div><div class="table-wrap"><table>';
  html+='<thead><tr><th>Month</th><th>Loans</th><th>Gross</th><th>Zaphire</th><th>Deric</th><th>Jules</th><th>Deric YTD</th></tr></thead><tbody>';
  var ytdRunning=0;
  mData.forEach(function(m,i){
    ytdRunning+=m.d;
    var isCurrentMonth = i===currentMonth;
    var rowStyle = isCurrentMonth ? 'background:rgba(201,168,76,0.05)' : '';
    html+='<tr style="'+rowStyle+'"><td>'+mNames[i]+(isCurrentMonth?' <span style="font-size:10px;color:var(--gold);margin-left:4px">&#9664; now</span>':'')+'</td><td>'+m.loans.length+'</td>';
    html+='<td class="mono">'+(m.gross?fmtDollar(m.gross):'\u2014')+'</td>';
    html+='<td class="mono">'+(m.z?fmtDollar(m.z):'\u2014')+'</td>';
    html+='<td class="mono" style="color:var(--gold)">'+(m.d?fmtDollar(m.d):'\u2014')+'</td>';
    html+='<td class="mono" style="color:#c4a8f5">'+(m.j?fmtDollar(m.j):'\u2014')+'</td>';
    html+='<td class="mono" style="color:'+(ytdRunning?'var(--gold-light)':'var(--muted)')+'">'+(ytdRunning?fmtDollar(ytdRunning):'\u2014')+'</td></tr>';
  });
  html+='<tr style="border-top:2px solid var(--border);font-weight:600"><td>TOTAL</td><td>'+closed.length+'</td><td class="mono">'+fmtDollar(tG)+'</td><td class="mono">'+fmtDollar(tZ)+'</td><td class="mono" style="color:var(--gold)">'+fmtDollar(tD)+'</td><td class="mono" style="color:#c4a8f5">'+fmtDollar(tJ)+'</td><td class="mono" style="color:var(--gold-light)">'+fmtDollar(ytdDeric)+'</td></tr>';
  html+='</tbody></table></div></div>';

  html+='<div class="card"><div class="card-title" style="margin-bottom:18px">Loan-by-Loan Detail</div><div class="table-wrap"><table>';
  html+='<thead><tr><th>Borrower</th><th>Date</th><th>Loan Amt</th><th>Comp%</th><th>Gross</th><th>Zaphire%</th><th>Zaphire$</th><th>Deric%</th><th>Deric$</th><th>Jules%</th><th>Jules$</th><th>Tolerance</th></tr></thead><tbody>';
  closed.forEach(function(l){
    html+='<tr onclick="openLoanDetail('+l.id+')">';
    html+='<td>'+esc(l.borrower)+'</td><td>'+fmtDate(l.closing_date)+'</td><td class="mono">'+fmtDollar(l.loan_amount)+'</td>';

    html+='<td class="mono">'+(l.deric_pct||32.5)+'%</td><td class="mono" style="color:var(--gold)">'+fmtDollar(l.deric_amount)+'</td>';
    html+='<td class="mono">'+(l.jules_pct||32.5)+'%</td><td class="mono" style="color:#c4a8f5">'+fmtDollar(l.jules_amount||0)+'</td>';
    html+='<td class="mono" style="color:'+(+(l.tolerance||0)?'var(--red)':'var(--muted)')+'">'+fmtDollar(l.tolerance||0)+'</td></tr>';
  });
  html+='</tbody></table></div></div>';
  el.innerHTML=html;
}

// ── SETTINGS ─────────────────────────────────
function renderSettings(){
  var el=document.getElementById('content');
  var s=state.settings;
  var html='<div class="tabs">';
  var tabs={dropdowns:'Dropdown Options',comp:'Compensation',backup:'&#128190; Backup',general:'General'};
  Object.keys(tabs).forEach(function(t){
    html+='<div class="tab'+(settingsTab===t?' active':'')+'" onclick="settingsTab=\''+t+'\';renderSettings()">'+tabs[t]+'</div>';
  });
  html+='</div>';

  if(settingsTab==='dropdowns'){
    html+=tagEditor('Loan Types','loanTypes');
    html+=tagEditor('Loan Statuses','loanStatuses');
    html+=tagEditor('Loan Purposes','loanPurposes');
    html+=tagEditor('MLO Names','mloNames');
  } else if(settingsTab==='comp'){
    html+='<div class="card"><div class="card-title" style="margin-bottom:18px">Default Compensation Splits</div><div class="form-grid">';
    html+='<div class="form-group"><label>Company Comp % (default)</label><div class="input-prefix"><span>%</span><input type="number" step="0.1" value="'+s.zaphireCompPct+'" oninput="state.settings.zaphireCompPct=+this.value;saveSettings()"></div></div>';
    html+='<div class="form-group"><label>Zaphire Split % (of gross)</label><div class="input-prefix"><span>%</span><input type="number" step="0.1" value="'+s.zaphireSplitPct+'" oninput="state.settings.zaphireSplitPct=+this.value;saveSettings()"></div></div>';
    html+='<div class="form-group"><label>Deric Split % (of gross)</label><div class="input-prefix"><span>%</span><input type="number" step="0.1" value="'+s.dericSplitPct+'" oninput="state.settings.dericSplitPct=+this.value;saveSettings()"></div></div>';
    html+='<div class="form-group"><label>Jules Split % (of gross)</label><div class="input-prefix"><span>%</span><input type="number" step="0.1" value="'+s.julesSplitPct+'" oninput="state.settings.julesSplitPct=+this.value;saveSettings()"></div></div>';
    html+='</div></div>';
  } else if(settingsTab==='backup'){

function tagEditor(title,key){
  var items=state.settings[key]||[];
  var html='<div class="card" style="margin-bottom:16px">';
  html+='<div class="card-header"><div><div class="card-title">'+title+'</div><div class="card-sub">'+items.length+' option'+(items.length!==1?'s':'')+'</div></div></div>';
  html+='<div class="tag-list">';
  items.forEach(function(item,i){
    html+='<span class="tag">'+esc(item)+'<span class="tag-del" onclick="removeTag(\''+key+'\','+i+')">&#215;</span></span>';
  });
  html+='</div><div class="tag-add-row">';
  html+='<input type="text" id="tag-input-'+key+'" placeholder="Add option..." style="max-width:240px">';
  html+='<button class="btn btn-gold btn-sm" onclick="addTag(\''+key+'\')">Add</button></div></div>';
  return html;
}

function addTag(key){
  var input=document.getElementById('tag-input-'+key);
  var val=input.value.trim();
  if(!val) return;
  if(!state.settings[key]) state.settings[key]=[];
  if(state.settings[key].indexOf(val)<0) state.settings[key].push(val);
  input.value='';
  saveSettings();renderSettings();
}
function removeTag(key,idx){
  state.settings[key].splice(idx,1);
  saveSettings();renderSettings();
}
function saveSettings(){
  apiUpsert('zt_settings',[{key:'main',value:JSON.stringify(state.settings)}])
    .then(function(){setSyncStatus('saved','Saved \u2713');})
    .catch(function(e){setSyncStatus('error','Save failed');});
}

// ── BACKUP ───────────────────────────────────
function downloadBackup() {
  var btn = document.getElementById('backup-btn');
  var status = document.getElementById('backup-status');
  if(btn) { btn.textContent = 'Pulling data...'; btn.disabled = true; }
  if(status) { status.textContent = ''; }

  // Fetch all three tables fresh from Supabase
  Promise.all([
    apiGet('zt_loans', 'select=*'),
    apiGet('zt_settings', 'select=*'),
    apiGet('zt_notes', 'select=*')
  ]).then(function(results) {
    var backup = {
      exported_at: new Date().toISOString(),
      exported_by: 'Zaphire Capital Loan Tracker',
      version: '1.0',
      supabase_project: 'ordrazjxfucogkjykpcf',
      summary: {
        total_loans: (results[0]||[]).length,
        active_loans: (results[0]||[]).filter(function(l){return l.status==='Active';}).length,
        closed_loans: (results[0]||[]).filter(function(l){return l.status==='Closed';}).length,
        trashed_loans: (results[0]||[]).filter(function(l){return !!l.deleted_at;}).length,
        total_notes: (results[2]||[]).length
      },
      tables: {
        zt_loans:    results[0] || [],
        zt_settings: results[1] || [],
        zt_notes:    results[2] || []
      }
    };

    var json = JSON.stringify(backup, null, 2);
    var blob = new Blob([json], {type: 'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var date = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = 'ZaphireCapital_Backup_' + date + '.json';
    a.click();
    URL.revokeObjectURL(url);

    if(btn) { btn.textContent = '\u2713 Backup Downloaded'; btn.disabled = false; }
    if(status) {
      status.style.color = 'var(--green)';
      status.textContent = backup.summary.total_loans + ' loans, ' + backup.summary.total_notes + ' notes exported on ' + new Date().toLocaleString();
    }
  }).catch(function(e) {
    if(btn) { btn.textContent = 'Download Backup'; btn.disabled = false; }
    if(status) { status.style.color = 'var(--red)'; status.textContent = 'Error: ' + e.message; }
  });
}

  html+='<input type="number" id="'+pctId+'" step="0.1" value="'+pctVal+'" oninput="'+pctEvt+'" style="margin-top:3px;background:rgba(255,255,255,0.06);border:1px solid '+border+';border-radius:6px;color:var(--white);font-size:13px;padding:6px 8px;width:100%"></div>';
  html+='<div><label style="font-size:10px;color:var(--muted)">Dollar Amount</label>';
  html+='<input type="number" id="'+dolId+'" step="0.01" value="'+dolVal+'" oninput="'+dolEvt+'" style="margin-top:3px;background:rgba(255,255,255,0.06);border:1px solid '+border+';border-radius:6px;color:'+color+';font-size:14px;font-weight:600;padding:6px 8px;width:100%;font-family:\'JetBrains Mono\',monospace"></div>';
  html+='</div>';
  return html;
}

// ── COMP CALC ────────────────────────────────
function getAdj(){var g=parseFloat(document.getElementById('f-gross').value)||0;var t=parseFloat(document.getElementById('f-tol').value)||0;return g-t;}
function refreshSummary(adj){
  var zDol=parseFloat(document.getElementById('f-zaphire').value)||0;
  var rem=adj-zDol;
  var a=document.getElementById('f-adj-display'),b=document.getElementById('f-mlo-display'),c=document.getElementById('f-mlo-pct');
  if(a) a.textContent=fmtDollar(adj);
  if(b) b.textContent=fmtDollar(rem);
  if(c) c.textContent=adj>0?(rem/adj*100).toFixed(1)+'% of gross \u2192 Deric + Jules':'after Zaphire cut';
}
function checkBalance(adj){
  var z=parseFloat(document.getElementById('f-zaphire').value)||0;
  var d=parseFloat(document.getElementById('f-deric').value)||0;
  var j=parseFloat(document.getElementById('f-jules').value)||0;
  var diff=adj-(z+d+j);
  var el=document.getElementById('f-split-check');if(!el) return;
  var zP=adj>0?(z/adj*100).toFixed(1):0,dP=adj>0?(d/adj*100).toFixed(1):0,jP=adj>0?(j/adj*100).toFixed(1):0;
  if(Math.abs(diff)<0.02){
    el.style.cssText='margin-top:14px;padding:9px 14px;border-radius:6px;font-size:12px;text-align:center;background:rgba(45,198,83,0.1);color:var(--green);border:1px solid rgba(45,198,83,0.25)';
    el.textContent='\u2713 Balanced \u2014 Zaphire '+zP+'% + Deric '+dP+'% + Jules '+jP+'% = 100% of '+fmtDollar(adj);
  } else {
    el.style.cssText='margin-top:14px;padding:9px 14px;border-radius:6px;font-size:12px;text-align:center;background:rgba(230,57,70,0.1);color:var(--red);border:1px solid rgba(230,57,70,0.25)';
    el.textContent='\u26a0 '+fmtDollar(Math.abs(diff))+' '+(diff>0?'unallocated':'over-allocated')+' \u2014 '+zP+'% + '+dP+'% + '+jP+'% \u2260 100%';
  }
}
function calcCompFields(){
  var amt=parseFloat(document.getElementById('f-amount').value)||0;
  var cPct=parseFloat(document.getElementById('f-comppct').value)||0;
  var gEl=document.getElementById('f-gross');
  if(gEl&&!gEl._manual) gEl.value=(amt*cPct/100).toFixed(2);
  var adj=getAdj();
  var zPct=parseFloat(document.getElementById('f-zaphire-pct').value)||0;
  var dPct=parseFloat(document.getElementById('f-deric-pct').value)||0;
  var jPct=parseFloat(document.getElementById('f-jules-pct').value)||0;
  var zEl=document.getElementById('f-zaphire'),dEl=document.getElementById('f-deric'),jEl=document.getElementById('f-jules');
  if(zEl) zEl.value=(adj*zPct/100).toFixed(2);
  if(dEl) dEl.value=(adj*dPct/100).toFixed(2);
  if(jEl) jEl.value=(adj*jPct/100).toFixed(2);
  refreshSummary(adj);checkBalance(adj);
}
function compPctChanged(){var amt=parseFloat(document.getElementById('f-amount').value)||0;var cPct=parseFloat(document.getElementById('f-comppct').value)||0;var gEl=document.getElementById('f-gross');if(gEl){gEl.value=(amt*cPct/100).toFixed(2);gEl._manual=false;}calcCompFields();}
function grossChanged(){var amt=parseFloat(document.getElementById('f-amount').value)||0;var g=parseFloat(document.getElementById('f-gross').value)||0;var gEl=document.getElementById('f-gross');if(gEl) gEl._manual=true;var cEl=document.getElementById('f-comppct');if(cEl&&amt>0) cEl.value=(g/amt*100).toFixed(4);calcCompFields();}
function zaphirePctChanged(){var adj=getAdj();var pct=parseFloat(document.getElementById('f-zaphire-pct').value)||0;var el=document.getElementById('f-zaphire');if(el) el.value=(adj*pct/100).toFixed(2);refreshSummary(adj);checkBalance(adj);}
function zaphireDollarChanged(){var adj=getAdj();var dol=parseFloat(document.getElementById('f-zaphire').value)||0;var el=document.getElementById('f-zaphire-pct');if(el) el.value=adj>0?(dol/adj*100).toFixed(2):'0';refreshSummary(adj);checkBalance(adj);}
function dericPctChanged(){var adj=getAdj();var pct=parseFloat(document.getElementById('f-deric-pct').value)||0;var el=document.getElementById('f-deric');if(el) el.value=(adj*pct/100).toFixed(2);checkBalance(adj);}
function dericDollarChanged(){var adj=getAdj();var dol=parseFloat(document.getElementById('f-deric').value)||0;var el=document.getElementById('f-deric-pct');if(el) el.value=adj>0?(dol/adj*100).toFixed(2):'0';checkBalance(adj);}
function julesPctChanged(){var adj=getAdj();var pct=parseFloat(document.getElementById('f-jules-pct').value)||0;var el=document.getElementById('f-jules');if(el) el.value=(adj*pct/100).toFixed(2);checkBalance(adj);}
function julesDollarChanged(){var adj=getAdj();var dol=parseFloat(document.getElementById('f-jules').value)||0;var el=document.getElementById('f-jules-pct');if(el) el.value=adj>0?(dol/adj*100).toFixed(2):'0';checkBalance(adj);}

// ── SAVE / DELETE LOAN ───────────────────────
function saveLoan(id){
  var borrower=document.getElementById('f-borrower').value.trim();
  if(!borrower){alert('Borrower name is required.');return;}
  var gross=parseFloat(document.getElementById('f-gross').value)||0;
  var tol=parseFloat(document.getElementById('f-tol').value)||0;
  function dateOrNull(field){var v=document.getElementById(field).value;return v||null;}
  var data={
    borrower:borrower,
    loan_amount:parseFloat(document.getElementById('f-amount').value)||0,
    closing_date:dateOrNull('f-date'),
    type:document.getElementById('f-type').value,
    status:document.getElementById('f-status').value,
    company_comp_pct:parseFloat(document.getElementById('f-comppct').value)||0,
    gross_earnings:gross,
    tolerance:tol,
    zaphire_pct:parseFloat(document.getElementById('f-zaphire-pct').value)||35,
    zaphire_cut:parseFloat(document.getElementById('f-zaphire').value)||0,
    deric_pct:parseFloat(document.getElementById('f-deric-pct').value)||32.5,
    deric_amount:parseFloat(document.getElementById('f-deric').value)||0,
    jules_pct:parseFloat(document.getElementById('f-jules-pct').value)||32.5,
    jules_amount:parseFloat(document.getElementById('f-jules').value)||0,
    expected_close_date:dateOrNull('f-expected-close'),
    expected_fund_date:dateOrNull('f-expected-fund'),
    loans_linked:document.getElementById('f-linked').value.trim(),
    pipeline_notes:document.getElementById('f-pipeline-notes').value.trim(),
    notes:document.getElementById('f-notes').value.trim()
  };
  setSyncStatus('saving','Saving...');
  var promise=id?apiPatch('zt_loans',id,data):apiPost('zt_loans',[data]);
  promise.then(function(result){
    var saved=Array.isArray(result)?result[0]:result;
    if(id){
      var idx=state.loans.findIndex(function(x){return x.id===id;});
      if(idx>=0) state.loans[idx]=saved;
    } else {
      state.loans.push(saved);
    }
    setSyncStatus('saved','Saved \u2713');
    closeModal();showPage(currentPage);
  }).catch(function(e){setSyncStatus('error','Save failed');alert('Error saving loan: '+e.message);});
}

// ── SOFT DELETE — moves to trash ─────────────
function deleteLoan(id) {
  if(!confirm('Move this loan to Trash? It will be automatically deleted after 30 days.')) return;
  setSyncStatus('saving', 'Moving to trash...');
  var now = new Date().toISOString();
  apiPatch('zt_loans', id, {deleted_at: now}).then(function() {
    var loan = state.loans.find(function(l){return l.id===id;});
    if(loan) { loan.deleted_at = now; state.trash.push(loan); }
    state.loans = state.loans.filter(function(l){return l.id!==id;});
    updateTrashBadge();
    setSyncStatus('saved', 'Moved to trash \u2713');
    showPage(currentPage);
  }).catch(function(e){setSyncStatus('error','Failed');alert('Error: '+e.message);});
}

// ── RESTORE from trash ────────────────────────
function restoreLoan(id) {
  setSyncStatus('saving', 'Restoring...');
  apiPatch('zt_loans', id, {deleted_at: null}).then(function() {
    var loan = state.trash.find(function(l){return l.id===id;});
    if(loan) { loan.deleted_at = null; state.loans.push(loan); }
    state.trash = state.trash.filter(function(l){return l.id!==id;});
    updateTrashBadge();
    setSyncStatus('saved', 'Restored \u2713');
    renderTrash();
  }).catch(function(e){setSyncStatus('error','Failed');alert('Error: '+e.message);});
}

// ── PERMANENT DELETE ──────────────────────────
function permanentDeleteLoan(id) {
  if(!confirm('Permanently delete this loan? This CANNOT be undone.')) return;
  setSyncStatus('saving', 'Deleting...');
  apiDelete('zt_loans', id).then(function() {
    state.trash = state.trash.filter(function(l){return l.id!==id;});
    updateTrashBadge();
    setSyncStatus('saved', 'Deleted \u2713');
    renderTrash();
  }).catch(function(e){setSyncStatus('error','Failed');alert('Error: '+e.message);});
}

// ── EMPTY TRASH ───────────────────────────────
function emptyTrash() {
  if(!confirm('Permanently delete ALL items in trash? This CANNOT be undone.')) return;
  setSyncStatus('saving', 'Emptying trash...');
  var ids = state.trash.map(function(l){return l.id;});
  var deletes = ids.map(function(id){return apiDelete('zt_loans',id);});
  Promise.all(deletes).then(function(){
    state.trash = [];
    updateTrashBadge();
    setSyncStatus('saved', 'Trash emptied \u2713');
    renderTrash();
  }).catch(function(e){setSyncStatus('error','Failed');alert('Error: '+e.message);});
}

// ── RENDER TRASH PAGE ─────────────────────────
function renderTrash() {
  var el = document.getElementById('content');
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 30);
  var items = (state.trash||[]).slice().sort(function(a,b){
    return (b.deleted_at||'') > (a.deleted_at||'') ? 1 : -1;
  });

  var html = '<div class="card">';
  html += '<div class="card-header"><div><div class="card-title">&#128465; Trash</div>';
  html += '<div class="card-sub">Loans are permanently deleted after 30 days</div></div>';
  if(items.length) {
    html += '<button class="btn btn-danger btn-sm" onclick="emptyTrash()">Empty Trash</button>';
  }
  html += '</div>';

  if(!items.length) {
    html += '<div style="text-align:center;padding:60px;color:var(--muted)"><div style="font-size:48px;margin-bottom:12px;opacity:0.3">&#128465;</div><div style="font-size:14px">Trash is empty</div></div>';
  } else {
    items.forEach(function(l) {
      var deletedDate = new Date(l.deleted_at);
      var expireDate = new Date(l.deleted_at);
      expireDate.setDate(expireDate.getDate() + 30);
      var daysLeft = Math.ceil((expireDate - new Date()) / 86400000);
      var urgColor = daysLeft <= 3 ? 'var(--red)' : daysLeft <= 7 ? '#f4a261' : 'var(--muted)';

      html += '<div style="border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:16px;opacity:0.85">';
      html += '<div style="flex:1">';
      html += '<div style="font-weight:600;font-size:14px;color:var(--white);margin-bottom:4px">'+esc(l.borrower)+'</div>';
      html += '<div style="font-size:12px;color:var(--muted)">'+esc(l.type)+' &middot; '+fmtDollar(l.loan_amount)+' &middot; '+badge(l.status)+'</div>';
      html += '<div style="font-size:11px;margin-top:6px"><span style="color:var(--muted)">Deleted: '+deletedDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</span>';
      html += ' &nbsp;&middot;&nbsp; <span style="color:'+urgColor+'">';
      html += daysLeft > 0 ? 'Auto-deletes in '+daysLeft+' day'+(daysLeft!==1?'s':'') : 'Expires today';
      html += '</span></div></div>';
      html += '<div style="display:flex;gap:8px;flex-shrink:0">';
      html += '<button class="btn btn-teal btn-sm" onclick="restoreLoan('+l.id+')">&#8617; Restore</button>';
      html += '<button class="btn btn-danger btn-sm" onclick="permanentDeleteLoan('+l.id+')">Delete Forever</button>';
      html += '</div></div>';
    });
  }
  html += '</div>';
  el.innerHTML = html;
}

// ── IMPORTANT DATES ──────────────────────────

var DATE_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function updateDatesBadge() {
  var today = new Date(); today.setHours(0,0,0,0);
  var soon = (state.dates||[]).filter(function(d){
    if(!d.due_date || d.completed) return false;
    var due = new Date(d.due_date + 'T12:00:00');
    var days = Math.round((due - today) / 86400000);
    return days <= 14 && days >= 0;
  });
  var el = document.getElementById('dates-due-count');
  if(!el) return;
  if(soon.length > 0) { el.textContent = soon.length; el.style.display = 'inline'; }
  else { el.style.display = 'none'; }
}

function renderDates() {
  var el = document.getElementById('content');
  var today = new Date(); today.setHours(0,0,0,0);
  var active = (state.dates||[]).filter(function(d){ return !d.deleted_at; });
  var html = '';

  // ── NEXT UP banner ──
  var upcoming = active.filter(function(d){
    if(d.completed || !d.due_date) return false;
    var due = new Date(d.due_date + 'T12:00:00');
    return due >= today;
  }).sort(function(a,b){ return a.due_date > b.due_date ? 1 : -1; }).slice(0,3);

  if(upcoming.length) {
    html += '<div class="card" style="margin-bottom:20px;border-color:rgba(230,57,70,0.3)">';
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">';
    html += '<div style="font-size:20px">&#128680;</div>';
    html += '<div class="card-title" style="color:var(--red)">Up Next</div>';
    html += '<div class="card-sub" style="margin:0">Your most urgent upcoming items</div></div>';
    upcoming.forEach(function(d) {
      var due = new Date(d.due_date + 'T12:00:00');
      var days = Math.round((due - today) / 86400000);
      var urgColor = days <= 3 ? 'var(--red)' : days <= 7 ? '#f4a261' : 'var(--gold)';
      var urgLabel = days === 0 ? 'Due TODAY' : days === 1 ? 'Due TOMORROW' : 'Due in ' + days + ' days';
      html += '<div style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)">';
      html += '<div style="width:3px;height:40px;background:'+urgColor+';border-radius:2px;flex-shrink:0"></div>';
      html += '<div style="flex:1"><div style="font-weight:600;color:var(--white);font-size:13px">'+esc(d.title)+'</div>';
      html += '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+esc(d.requirer||'')+(d.fee?'  &middot;  Fee: $'+parseFloat(d.fee).toFixed(2):'')+'</div></div>';
      html += '<div style="text-align:right;flex-shrink:0"><div style="font-size:13px;font-weight:600;color:'+urgColor+'">'+urgLabel+'</div>';
      html += '<div style="font-size:11px;color:var(--muted)">'+fmtDate(d.due_date)+'</div></div>';
      html += '<button class="btn btn-ghost btn-sm" onclick="openEditDate('+d.id+')">View</button></div>';
    });
    html += '</div>';
  }

  // ── Month-by-month list ──
  DATE_MONTHS.forEach(function(month, mi) {
    var monthItems = active.filter(function(d){
      if(!d.due_date) return false;
      return new Date(d.due_date + 'T12:00:00').getMonth() === mi;
    }).sort(function(a,b){ return a.due_date > b.due_date ? 1 : -1; });

    // Also include items with no date in January as a catch-all (only show once)
    var noDates = [];
    if(mi === 0) {
      noDates = active.filter(function(d){ return !d.due_date; });
    }

    var allItems = monthItems.concat(noDates);
    if(!allItems.length) return;

    var currentYear = new Date().getFullYear();
    var isCurrentMonth = mi === today.getMonth() && currentYear === today.getFullYear();

    html += '<div class="card" style="margin-bottom:16px'+(isCurrentMonth?';border-color:rgba(201,168,76,0.4)':'')+'">';
    html += '<div class="card-header" style="margin-bottom:12px">';
    html += '<div><div class="card-title">'+(isCurrentMonth?'&#9654; ':'')+month+'</div>';
    html += '<div class="card-sub">'+allItems.length+' item'+(allItems.length!==1?'s':'')+(isCurrentMonth?' &nbsp;&bull;&nbsp; <span style="color:var(--gold)">Current month</span>':'')+'</div></div>';
    html += '<button class="btn btn-ghost btn-sm" onclick="openAddDateForMonth('+mi+')">+ Add</button></div>';

    allItems.forEach(function(d) {
      var due = d.due_date ? new Date(d.due_date + 'T12:00:00') : null;
      var days = due ? Math.round((due - today) / 86400000) : null;
      var overdue = days !== null && days < 0 && !d.completed;
      var soonFlag = days !== null && days <= 7 && days >= 0 && !d.completed;
      var urgColor = d.completed ? 'var(--green)' : overdue ? 'var(--red)' : soonFlag ? '#f4a261' : 'var(--muted)';
      var rowBg = d.completed ? 'rgba(45,198,83,0.04)' : overdue ? 'rgba(230,57,70,0.06)' : 'rgba(255,255,255,0.02)';

      html += '<div style="background:'+rowBg+';border:1px solid rgba(255,255,255,0.06);border-left:3px solid '+urgColor+';border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer" onclick="openEditDate('+d.id+')">';
      html += '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">';
      html += '<div style="flex:1;min-width:0">';

      // Title + completed badge
      html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">';
      html += '<span style="font-weight:600;font-size:13px;color:'+(d.completed?'var(--muted)':'var(--white)')+';'+(d.completed?'text-decoration:line-through':'')+'">'+esc(d.title)+'</span>';
      if(d.completed) html += '<span class="badge badge-open">&#10003; Done</span>';
      if(overdue) html += '<span class="badge badge-closed">Overdue</span>';
      if(soonFlag) html += '<span class="badge badge-pending">Soon</span>';
      if(d.requirer) html += '<span style="font-size:10px;color:var(--muted);background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:10px">'+esc(d.requirer)+'</span>';
      html += '</div>';

      // Meta row
      html += '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--muted)">';
      if(d.due_date) html += '<span>&#128197; '+fmtDate(d.due_date)+(days!==null&&!d.completed?' ('+( days===0?'today':days===1?'tomorrow':days<0?Math.abs(days)+'d overdue':days+'d away')+')'  :'')+'</span>';
      if(d.fee) html += '<span>&#128181; $'+parseFloat(d.fee).toFixed(2)+'</span>';
      if(d.file_path) html += '<span title="'+esc(d.file_path)+'">&#128193; '+esc(d.file_path.length>35?d.file_path.slice(0,35)+'...':d.file_path)+'</span>';
      if(d.url) html += '<span style="color:var(--teal-light)">&#128279; Link saved</span>';
      if(d.completed_date) html += '<span style="color:var(--green)">&#10003; Completed '+fmtDate(d.completed_date)+'</span>';
      html += '</div>';

      if(d.notes) html += '<div style="font-size:11px;color:var(--muted);margin-top:6px;opacity:0.8">'+esc(d.notes.length>120?d.notes.slice(0,120)+'...':d.notes)+'</div>';
      html += '</div>';

      // Action buttons
      html += '<div style="display:flex;gap:6px;flex-shrink:0" onclick="event.stopPropagation()">';
      if(!d.completed) {
        html += '<button class="btn btn-teal btn-sm" onclick="markDateComplete('+d.id+')">&#10003;</button>';
      }
      html += '<button class="btn btn-ghost btn-sm" onclick="openEditDate('+d.id+')">Edit</button>';
      html += '<button class="btn btn-danger btn-sm" onclick="softDeleteDate('+d.id+')">Del</button>';
      html += '</div></div></div>';
    });
    html += '</div>';
  });

  // Undated items catch-all already in January above
  if(!active.length) {
    html += '<div style="text-align:center;padding:80px 20px;color:var(--muted)"><div style="font-size:48px;margin-bottom:16px;opacity:0.3">&#128197;</div>';
    html += '<div style="font-size:15px;margin-bottom:8px">No important dates yet</div>';
    html += '<div style="font-size:13px">Click "+ Add Date" to get started</div></div>';

  // Dates trash section
  var dTrash = (state.datesTrash||[]).filter(function(d){
    var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-30);
    return new Date(d.deleted_at) > cutoff;
  });
  if(dTrash.length) {
    html += '<div class="card" style="margin-top:20px;border-color:rgba(230,57,70,0.2)">';
    html += '<div class="card-header"><div><div class="card-title" style="color:var(--red)">&#128465; Recently Deleted</div><div class="card-sub">Auto-purged after 30 days</div></div>';
    html += '<button class="btn btn-danger btn-sm" onclick="emptyDatesTrash()">Empty</button></div>';
    dTrash.forEach(function(d){
      var daysLeft = Math.ceil((new Date(new Date(d.deleted_at).getTime()+30*86400000) - new Date()) / 86400000);
      html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)">';
      html += '<div><div style="font-size:13px;color:var(--muted);text-decoration:line-through">'+esc(d.title)+'</div>';
      html += '<div style="font-size:11px;color:var(--red);margin-top:2px">Deletes in '+daysLeft+' day'+(daysLeft!==1?'s':'')+'</div></div>';
      html += '<button class="btn btn-teal btn-sm" onclick="restoreDate('+d.id+')">&#8617; Restore</button></div>';
    });
    html += '</div>';
  }

  el.innerHTML = html;
}

// ── Date form modal ──────────────────────────
var DATE_REQUIRERS = ['NMLS','NYSDFS','IRS','HUD','CFPB','State DOB','FDIC','Other'];

function openAddDate(month) {
  showDateForm(null, month !== undefined ? month : null);
}
function openAddDateForMonth(mi) { showDateForm(null, mi); }
function openEditDate(id) { showDateForm(id, null); }

function showDateForm(id, defaultMonth) {
  var d = id ? (state.dates||[]).find(function(x){return x.id===id;}) : null;
  function v(f, def) {
    if(def===undefined) def='';
    return d ? (d[f]!==undefined&&d[f]!==null ? d[f] : def) : def;
  }

  // Build requirer options
  var reqList = (state.settings.dateRequirers || DATE_REQUIRERS);
  var reqOptions = reqList.map(function(r){
    return '<option value="'+esc(r)+'"'+(v('requirer')===r?' selected':'')+'>'+esc(r)+'</option>';
  }).join('');

  // Default due date to first of chosen month if adding
  var defaultDate = '';
  if(!id && defaultMonth !== null && defaultMonth !== undefined) {
    var yr = new Date().getFullYear();
    defaultDate = yr + '-' + String(defaultMonth+1).padStart(2,'0') + '-01';
  }

  var html = '<div class="modal-title">'+(d?'Edit Date':'Add Important Date')+'</div>';
  html += '<div class="modal-sub">'+(d?esc(d.title):'Add a compliance, licensing, or company deadline')+'</div>';
  html += '<div class="form-grid">';
  html += '<div class="form-group full"><label>Title / Task Name</label><input type="text" id="fd-title" value="'+esc(v('title'))+'" placeholder="e.g. VOOR Due, License Renewal, Tax Filing..."></div>';
  html += '<div class="form-group"><label>Due Date</label><input type="date" id="fd-due" value="'+(v('due_date')||defaultDate)+'"></div>';
  html += '<div class="form-group"><label>Required By</label><select id="fd-requirer"><option value="">Select...</option>'+reqOptions+'</select></div>';
  html += '<div class="form-group"><label>Website / Link</label><input type="url" id="fd-url" value="'+esc(v('url'))+'" placeholder="https://..."></div>';
  html += '<div class="form-group"><label>Fee ($)</label><div class="input-prefix"><span>$</span><input type="number" id="fd-fee" step="0.01" value="'+(v('fee','')||'')+'" placeholder="0.00"></div></div>';
  html += '<div class="form-group full"><label>File Path / Where it\'s stored once completed</label><input type="text" id="fd-path" value="'+esc(v('file_path'))+'" placeholder="e.g. iCloud Drive / Zaphire / Compliance / 2026 / VOOR..."></div>';
  html += '<div class="form-group full"><label>Notes</label><textarea id="fd-notes" rows="3" placeholder="Any notes about this item...">'+esc(v('notes'))+'</textarea></div>';
  html += '</div>';

  // Completion section
  html += '<hr class="section-divider"><div class="section-label">Completion</div>';
  html += '<div class="form-grid">';
  html += '<div class="form-group"><label>Completed?</label>';
  html += '<select id="fd-completed"><option value="false"'+(v('completed',false)?'':' selected')+'>No &mdash; Not yet</option><option value="true"'+(v('completed',false)?' selected':'')+'>Yes &mdash; Done</option></select></div>';
  html += '<div class="form-group"><label>Completion Date</label><input type="date" id="fd-completed-date" value="'+v('completed_date')+'"></div>';
  html += '</div>';

  // Add requirer section
  html += '<hr class="section-divider"><div class="section-label">Manage Requirers Dropdown</div>';
  html += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
  html += reqList.map(function(r,i){return '<span class="tag">'+esc(r)+'<span class="tag-del" onclick="removeDateRequirer('+i+')">&#215;</span></span>';}).join('');
  html += '</div><div class="tag-add-row" style="margin-top:10px">';
  html += '<input type="text" id="fd-new-requirer" placeholder="Add requirer..." style="max-width:200px">';
  html += '<button class="btn btn-outline btn-sm" onclick="addDateRequirer()">Add</button></div>';

  html += '<div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="saveDate('+(id||'null')+')">'+( d?'Save Changes':'Add Date')+'</button></div>';
  openModal(html);
}

function addDateRequirer() {
  var inp = document.getElementById('fd-new-requirer');
  var val = inp.value.trim();
  if(!val) return;
  if(!state.settings.dateRequirers) state.settings.dateRequirers = DATE_REQUIRERS.slice();
  if(state.settings.dateRequirers.indexOf(val)<0) state.settings.dateRequirers.push(val);
  inp.value = '';
  saveSettings();
  // Refresh the modal form
  var id = null;
  var modal = document.getElementById('modal-content');
  if(modal) showDateForm(null, null);
}

function removeDateRequirer(idx) {
  if(!state.settings.dateRequirers) state.settings.dateRequirers = DATE_REQUIRERS.slice();
  state.settings.dateRequirers.splice(idx, 1);
  saveSettings();
  showDateForm(null, null);
}

function saveDate(id) {
  var title = document.getElementById('fd-title').value.trim();
  if(!title) { alert('Title is required.'); return; }
  function dateOrNull(fid) { var v=document.getElementById(fid).value; return v||null; }
  var data = {
    title: title,
    due_date: dateOrNull('fd-due'),
    requirer: document.getElementById('fd-requirer').value,
    url: document.getElementById('fd-url').value.trim(),
    fee: parseFloat(document.getElementById('fd-fee').value)||null,
    file_path: document.getElementById('fd-path').value.trim(),
    notes: document.getElementById('fd-notes').value.trim(),
    completed: document.getElementById('fd-completed').value === 'true',
    completed_date: dateOrNull('fd-completed-date')
  };
  setSyncStatus('saving','Saving...');
  var promise = id ? apiPatch('zt_dates',id,data) : apiPost('zt_dates',[data]);
  promise.then(function(result){
    var saved = Array.isArray(result) ? result[0] : result;
    if(id) {
      var idx = (state.dates||[]).findIndex(function(x){return x.id===id;});
      if(idx>=0) state.dates[idx] = saved;
    } else {
      if(!state.dates) state.dates=[];
      state.dates.push(saved);
    }
    updateDatesBadge();
    setSyncStatus('saved','Saved \u2713');
    closeModal(); renderDates();
  }).catch(function(e){ setSyncStatus('error','Failed'); alert('Error: '+e.message); });
}

function markDateComplete(id) {
  var today = new Date().toISOString().slice(0,10);
  apiPatch('zt_dates', id, {completed: true, completed_date: today}).then(function(result){
    var saved = Array.isArray(result)?result[0]:result;
    var idx = (state.dates||[]).findIndex(function(x){return x.id===id;});
    if(idx>=0) state.dates[idx] = saved;
    updateDatesBadge(); renderDates();
    setSyncStatus('saved','Saved \u2713');
  }).catch(function(e){ alert('Error: '+e.message); });
}

function softDeleteDate(id) {
  if(!confirm('Move this item to trash? It will be permanently deleted after 30 days.')) return;
  var now = new Date().toISOString();
  apiPatch('zt_dates', id, {deleted_at: now}).then(function(result){
    var saved = Array.isArray(result)?result[0]:result;
    state.dates = (state.dates||[]).filter(function(x){return x.id!==id;});
    if(!state.datesTrash) state.datesTrash=[];
    state.datesTrash.push(saved);
    updateDatesBadge(); renderDates();
    setSyncStatus('saved','Moved to trash \u2713');
  }).catch(function(e){ alert('Error: '+e.message); });
}

function restoreDate(id) {
  apiPatch('zt_dates', id, {deleted_at: null}).then(function(result){
    var saved = Array.isArray(result)?result[0]:result;
    state.datesTrash = (state.datesTrash||[]).filter(function(x){return x.id!==id;});
    saved.deleted_at = null;
    if(!state.dates) state.dates=[];
    state.dates.push(saved);
    updateDatesBadge(); renderDates();
    setSyncStatus('saved','Restored \u2713');
  }).catch(function(e){ alert('Error: '+e.message); });
}

function emptyDatesTrash() {
  if(!confirm('Permanently delete all items in the dates trash?')) return;
  var ids = (state.datesTrash||[]).map(function(d){return d.id;});
  Promise.all(ids.map(function(id){return apiDelete('zt_dates',id);})).then(function(){
    state.datesTrash=[];
    renderDates();
    setSyncStatus('saved','Trash emptied \u2713');
  }).catch(function(e){ alert('Error: '+e.message); });
}
function openModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-overlay').style.display='flex';}
function closeModal(){document.getElementById('modal-overlay').style.display='none';}

// ── PASSWORD GATE ─────────────────────────────
// Change this to whatever password you want
var APP_PASSWORD = 'Zaphire8558!';

function checkPassword() {
  var input = document.getElementById('lock-input');
  var err = document.getElementById('lock-err');
  if(input.value === APP_PASSWORD) {
    // Store session so refreshing doesn't re-prompt (expires when tab closes)
    try { sessionStorage.setItem('zc_auth', '1'); } catch(e) {}
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initApp();
  } else {
    err.textContent = 'Incorrect password. Please try again.';
    input.value = '';
    input.focus();
    // Shake animation
    input.style.borderColor = 'var(--red)';
    setTimeout(function(){ input.style.borderColor = ''; }, 1500);
  }
}

// ── START ────────────────────────────────────
// Check if already authenticated this session
try {
  if(sessionStorage.getItem('zc_auth') === '1') {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initApp();
  } else {
    // Focus password field
    setTimeout(function(){ var el=document.getElementById('lock-input'); if(el) el.focus(); }, 100);
  }
} catch(e) {
  // sessionStorage blocked — just show lock screen
  setTimeout(function(){ var el=document.getElementById('lock-input'); if(el) el.focus(); }, 100);
}
</script>
